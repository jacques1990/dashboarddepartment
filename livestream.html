<!DOCTYPE html>
<html>
<head>
  <title>Live News Wall (No Black Screen)</title>

  <style>
    body {
      margin:0;
      background:#000;
      color:white;
      font-family:Arial;
    }

    .topbar {
      padding:10px;
      background:#111;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:6px;
      height:calc(100vh - 50px);
      padding:6px;
    }

    .player {
      position:relative;
      background:#000;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
    }

    .fallback {
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000;
      color:#fff;
      font-size:14px;
      text-align:center;
      padding:10px;
    }

    button {
      background:#ff0000;
      color:white;
      border:none;
      padding:6px 12px;
      cursor:pointer;
      border-radius:6px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>🔴 Live News Wall</div>
  <button onclick="loadStreams()">🔄 Refresh</button>
</div>

<div class="grid" id="grid"></div>

<script>

// ✅ Channels that ALWAYS work well for embedding
const channels = [
  {name:"BBC", id:"UC16niRr50-MSBwiO3YDb3RA"},
  {name:"Sky News", id:"UCoMdktPbSTixAyNGwb-UYkQ"},
  {name:"Reuters", id:"UChqUTb7kYRX8-EiaN3XFrSQ"},
  {name:"DW News", id:"UCknLrEdhRCp1aegoMqRaCZg"},
  {name:"Al Jazeera", id:"UCNye-wNBqNL5ZzHSJj3l8Bg"},
  {name:"ABC News", id:"UCBi2mrWuNuyYy4gbM6fU18Q"},
  {name:"CBS News", id:"UC8p1vwvWtl6T73JiExfWs1g"},
  {name:"NDTV", id:"UCZFMm1mMw0F81Z37aaEzTUA"},
  {name:"Bloomberg", id:"UCIALMKvObZNtJ6AmdCLP7Lg"}
];

function loadStreams() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  channels.forEach(ch => {

    const wrapper = document.createElement("div");
    wrapper.className = "player";

    const iframe = document.createElement("iframe");
    iframe.src = `https://www.youtube.com/embed/live_stream?channel=${ch.id}&autoplay=1&mute=1`;
    iframe.allow = "autoplay";

    // fallback if fails
    const fallback = document.createElement("div");
    fallback.className = "fallback";
    fallback.innerHTML = `
      ${ch.name}<br>
      <a href="https://www.youtube.com/channel/${ch.id}/live" target="_blank" style="color:#0af">
        Open Live →
      </a>
    `;

    // if iframe doesn't load properly, show fallback after delay
    setTimeout(() => {
      wrapper.appendChild(fallback);
    }, 4000);

    wrapper.appendChild(iframe);
    grid.appendChild(wrapper);
  });
}

loadStreams();

</script>

</body>
</html>
