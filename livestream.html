<!DOCTYPE html>
<html>
<head>
  <title>Live News Wall</title>

  <style>
    body {
      margin:0;
      background:#000;
      color:white;
      font-family:Arial;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:6px;
      height:100vh;
      padding:6px;
    }

    .player {
      position:relative;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
    }

    .label {
      position:absolute;
      top:5px;
      left:5px;
      background:rgba(0,0,0,0.6);
      padding:4px 8px;
      font-size:12px;
      border-radius:4px;
    }
  </style>
</head>

<body>

<div class="grid">

  <!-- Al Jazeera -->
  <div class="player">
    <div class="label">Al Jazeera</div>
   <iframe 
src="https://www.youtube.com/embed/l0tl9g0Jnf0?autoplay=1&mute=1"
allow="autoplay"
allowfullscreen>
</iframe>
  </div>

  <!-- Add more like this -->
  <div class="player">
    <div class="label">Channel 2</div>
    <iframe src="PASTE_NEXT_EMBED_LINK?autoplay=1&mute=1"></iframe>
  </div>

  <div class="player">
    <div class="label">Channel 3</div>
    <iframe src="PASTE_NEXT_EMBED_LINK?autoplay=1&mute=1"></iframe>
  </div>

</div>

</body>
</html>
