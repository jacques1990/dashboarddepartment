<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Neon Notes</title>
  <link rel="stylesheet" href="galaxy-style.css">
</head>

<body>

<div class="app">

  <div class="top-bar">
    <input id="title" placeholder="Note title">
    <select id="department">
      <option>Finance</option>
      <option>Daily Logs & Planner</option>
      <option>Business</option>
      <option>Controlled Documents</option>
    </select>
    <button onclick="saveNote()">💾 Save</button>
  </div>

  <div class="tool-bar">
    <button onclick="insertTodo()">☑ To-Do</button>
    <button onclick="insertTable()">📊 Table</button>
  </div>

  <div id="editor" contenteditable="true" class="editor"></div>

</div>

<script src="brain-core.js"></script>

</body>
</html>
