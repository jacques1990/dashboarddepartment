<!DOCTYPE html>
<html>
<head>
  <title>Live News Wall</title>

  <style>
    body {
      margin:0;
      background:#000;
      color:white;
      font-family:Arial;
    }

    .topbar {
      padding:10px;
      background:#111;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:6px;
      height:calc(100vh - 50px);
      padding:6px;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
      background:#000;
    }

    .player {
      position:relative;
    }

    .label {
      position:absolute;
      top:5px;
      left:5px;
      background:rgba(0,0,0,0.6);
      padding:3px 6px;
      font-size:12px;
      border-radius:4px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>🔴 Live News Wall</div>
</div>

<div class="grid">

  <!-- Example Players -->
  <div class="player">
    <div class="label">Channel 1</div>
    <iframe src="<iframe width="560" height="315" src="https://www.youtube.com/embed/l0tl9g0Jnf0?si=znUikWQuiqEmfnz3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>?autoplay=1&mute=1" allow="autoplay"></iframe>
  </div>

  <div class="player">
    <div class="label">Channel 2</div>
    <iframe src="EMBED_LINK_2?autoplay=1&mute=1" allow="autoplay"></iframe>
  </div>

  <div class="player">
    <div class="label">Channel 3</div>
    <iframe src="EMBED_LINK_3?autoplay=1&mute=1" allow="autoplay"></iframe>
  </div>

  <div class="player">
    <div class="label">Channel 4</div>
    <iframe src="EMBED_LINK_4?autoplay=1&mute=1" allow="autoplay"></iframe>
  </div>

  <div class="player">
    <div class="label">Channel 5</div>
    <iframe src="EMBED_LINK_5?autoplay=1&mute=1" allow="autoplay"></iframe>
  </div>

  <div class="player">
    <div class="label">Channel 6</div>
    <iframe src="EMBED_LINK_6?autoplay=1&mute=1" allow="autoplay"></iframe>
  </div>

</div>

</body>
</html>
