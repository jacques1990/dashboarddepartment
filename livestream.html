<!DOCTYPE html>
<html>
<head>
  <title>Live News Wall</title>
  <style>
    body {
      margin:0;
      background:#000;
      color:white;
      font-family:Arial;
    }

    .topbar {
      padding:10px;
      background:#111;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:6px;
      height:calc(100vh - 50px);
      padding:6px;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
    }

    button {
      background:#ff0000;
      color:white;
      border:none;
      padding:6px 12px;
      cursor:pointer;
      border-radius:6px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>🔴 Live News Wall</div>
  <button onclick="loadVideos()">🔄 Refresh</button>
</div>

<div class="grid" id="videoGrid"></div>

<script>
const API_KEY = "AIzaSyBf_Ugx8v1cvxpB2qbDmzPeRvSWb-t8_4c";
const PLAYLIST_ID = "PL_3uFR-OAD0FxSyyNYKnjR2XivFfsfEwx";

async function loadVideos() {
  const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=9&playlistId=${PLAYLIST_ID}&key=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  const grid = document.getElementById("videoGrid");
  grid.innerHTML = "";

  data.items.forEach(item => {
    const videoId = item.snippet.resourceId.videoId;

    const iframe = document.createElement("iframe");
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;
    iframe.allow = "autoplay";

    grid.appendChild(iframe);
  });
}

// auto load
loadVideos();

// auto refresh every 5 minutes
setInterval(loadVideos, 300000);
</script>

</body>
</html>
