
<!DOCTYPE html>
<html>
<head>
  <title>Trading War Room (Smart Resize)</title>

  <style>
    body {
      margin:0;
      background:#000;
      color:white;
      font-family:Arial;
      overflow:hidden;
    }

    .topbar {
      padding:10px;
      background:#111;
      text-align:center;
    }

    .container {
      display:flex;
      height:calc(100vh - 50px);
      width:100%;
    }

    .main {
      width:60%;
      min-width:200px;
    }

    .main iframe {
      width:100%;
      height:100%;
      border:none;
    }

    .resizer {
      width:6px;
      background:#222;
      cursor:col-resize;
    }

    .resizer:hover {
      background:red;
    }

    /* 🔥 SIDE PANEL SMART */
    .side {
      flex:1;
      display:grid;
      gap:8px;
      padding:8px;
    }

    .feed {
      position:relative;
      cursor:pointer;
    }

    .feed iframe {
      width:100%;
      height:100%;
      border:none;
    }

    .label {
      position:absolute;
      top:6px;
      left:6px;
      background:rgba(0,0,0,0.7);
      padding:4px 8px;
      font-size:12px;
      border-radius:4px;
    }

    .active {
      outline:2px solid red;
    }
  </style>
</head>

<body>

<div class="topbar">🔴 Trading War Room</div>

<div class="container">

  <div class="main" id="mainPanel">
    <iframe id="mainPlayer"></iframe>
  </div>

  <div class="resizer" id="resizer"></div>

  <div class="side" id="sideFeeds"></div>

</div>

<script>
const streams = [
  {name:"Stream 1", url:"https://www.youtube.com/embed/Ap-UM1O9RBU"},
  {name:"Al Jazeera", url:"https://www.youtube.com/embed/l0tl9g0Jnf0"},
  {name:"Stream 3", url:"https://www.youtube.com/embed/4wExBtPQ-JA"},
  {name:"Stream 4", url:"https://www.youtube.com/embed/5vfaDsMhCF4"},
  {name:"Stream 5", url:"https://www.youtube.com/embed/pykpO5kQJ98"},
  {name:"Stream 6", url:"https://www.youtube.com/embed/gCNeDWCI0vo"},
  {name:"New Stream", url:"https://www.youtube.com/embed/Mz1NkvRm8O8"},
  {name:"New Stream", url:"https://www.youtube.com/embed/iEpJwprxDdk"},
  {name:"New Stream", url:"https://www.youtube.com/embed/pwN9wCZnhs0"},
  {name:"New Stream", url:"https://www.youtube.com/embed/cn6ptV-3bxM"},
  
  
];
const mainPlayer = document.getElementById("mainPlayer");
const sideFeeds = document.getElementById("sideFeeds");
const mainPanel = document.getElementById("mainPanel");

// 🔥 CREATE FEEDS
streams.forEach((s, index) => {
  const div = document.createElement("div");
  div.className = "feed";

  div.innerHTML = `
    <div class="label">${s.name}</div>
    <iframe src="${s.url}?autoplay=1&mute=1"></iframe>
  `;

  div.onclick = () => switchMain(s.url, div);

  sideFeeds.appendChild(div);

  if(index === 0) {
    switchMain(s.url, div);
  }
});

// 🔥 SWITCH MAIN
function switchMain(url, element) {
  mainPlayer.src = url + "?autoplay=1&mute=0";

  document.querySelectorAll(".feed").forEach(f => f.classList.remove("active"));
  element.classList.add("active");
}

// 🔥 SMART GRID ADJUSTMENT
function updateLayout() {
  const sideWidth = window.innerWidth - mainPanel.offsetWidth;

  if (sideWidth < 400) {
    sideFeeds.style.gridTemplateColumns = "1fr";
  } else if (sideWidth < 800) {
    sideFeeds.style.gridTemplateColumns = "repeat(2, 1fr)";
  } else {
    sideFeeds.style.gridTemplateColumns = "repeat(3, 1fr)";
  }
}

// 🔥 DRAG RESIZE
const resizer = document.getElementById("resizer");
let isDragging = false;

resizer.addEventListener("mousedown", () => {
  isDragging = true;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  let newWidth = (e.clientX / window.innerWidth) * 100;

  if (newWidth > 20 && newWidth < 80) {
    mainPanel.style.width = newWidth + "%";
    updateLayout(); // 🔥 KEY PART
  }
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

// initial
updateLayout();
  // ⌨️ KEYBOARD SHORTCUTS

document.addEventListener("keydown", (e) => {

  const key = e.key;

  // 🔢 Switch feeds (1–7)
  if (key >= 1 && key <= streams.length) {
    const index = key - 1;
    const feed = document.querySelectorAll(".feed")[index];
    if (feed) {
      switchMain(streams[index].url, feed);
    }
  }

  // 🔇 Toggle mute
  if (key === "m" || key === "M") {
    let src = mainPlayer.src;

    if (src.includes("mute=1")) {
      mainPlayer.src = src.replace("mute=1", "mute=0");
    } else {
      mainPlayer.src = src.replace("mute=0", "mute=1");
    }
  }

  // 🔲 Fullscreen
  if (key === "f" || key === "F") {
    if (mainPlayer.requestFullscreen) {
      mainPlayer.requestFullscreen();
    }
  }

  // ⬅️➡️ Resize without mouse
  if (key === "ArrowLeft" || key === "ArrowRight") {

    let currentWidth = mainPanel.offsetWidth;
    let total = window.innerWidth;

    let percent = (currentWidth / total) * 100;

    if (key === "ArrowLeft") percent -= 5;
    if (key === "ArrowRight") percent += 5;

    if (percent > 20 && percent < 80) {
      mainPanel.style.width = percent + "%";
      updateLayout();
    }
  }

});

</script>

</body>
</html>
